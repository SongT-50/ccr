name: CCR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ccr-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ccr-review
        run: pip install ccr-review

      - name: Get changed files
        id: changed
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | \
            grep -E '\.(py|js|ts|jsx|tsx|go|rs|java|kt|c|cpp|h|hpp|cs|rb|php|swift|scala)$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run CCR review
        if: steps.changed.outputs.skip == 'false'
        run: |
          REPORT=""
          FAIL=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            echo "::group::Reviewing $file"
            OUTPUT=$(ccr review "$file" 2>&1) || true
            echo "$OUTPUT"
            echo "::endgroup::"

            REPORT="${REPORT}
          ## \`${file}\`

          \`\`\`
          ${OUTPUT}
          \`\`\`
          "
          done <<< "${{ steps.changed.outputs.files }}"

          {
            echo "report<<EOF"
            echo "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post review comment
        if: steps.changed.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const report = process.env.REVIEW_REPORT;
            if (!report || !report.trim()) {
              console.log('No review output to post.');
              return;
            }

            // Find existing CCR comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- ccr-review-bot -->';
            const existing = comments.find(c => c.body.includes(marker));

            const body = `${marker}
            # 🔍 CCR Review

            > Cross-Context Review — 3 independent sessions, zero shared context.
            > Consensus findings (★) are flagged by 2+ reviewers independently.

            ${report}

            ---
            *Powered by [ccr-review](https://pypi.org/project/ccr-review/) | [Research paper](https://arxiv.org/abs/2603.12123)*`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          REVIEW_REPORT: ${{ steps.review.outputs.report }}

      - name: Skip notice
        if: steps.changed.outputs.skip == 'true'
        run: echo "No reviewable code files changed in this PR."
